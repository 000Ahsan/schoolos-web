<div class="flex flex-col flex-auto min-w-0 p-8 pt-10">

    <div class="flex items-center justify-between w-full mb-8">
        <div>
            <div class="text-3xl font-semibold tracking-tight leading-8">Academic Years</div>
            <div class="font-medium tracking-tight text-secondary">Manage school terms and student promotions</div>
        </div>

        <div>
            <button mat-flat-button color="primary" (click)="openAddDialog()">
                <mat-icon svgIcon="heroicons_outline:plus"></mat-icon>
                <span class="ml-2">Add Year</span>
            </button>
        </div>
    </div>

    <div class="flex flex-col flex-auto overflow-hidden bg-card shadow rounded-2xl">
        <div class="overflow-x-auto relative">
            <table mat-table [dataSource]="dataSource" class="w-full min-w-max">

                <ng-container matColumnDef="label">
                    <th mat-header-cell *matHeaderCellDef> Year Label </th>
                    <td mat-cell *matCellDef="let element" class="font-medium"> {{element.label}} </td>
                </ng-container>

                <ng-container matColumnDef="start_date">
                    <th mat-header-cell *matHeaderCellDef> Start Date </th>
                    <td mat-cell *matCellDef="let element"> {{element.start_date | date:'mediumDate'}} </td>
                </ng-container>

                <ng-container matColumnDef="end_date">
                    <th mat-header-cell *matHeaderCellDef> End Date </th>
                    <td mat-cell *matCellDef="let element"> {{element.end_date | date:'mediumDate'}} </td>
                </ng-container>

                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef> Status </th>
                    <td mat-cell *matCellDef="let element">
                        <span
                            class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold uppercase tracking-wider"
                            [ngClass]="{
                'bg-green-100 text-green-800': element.status === 'current',
                'bg-yellow-100 text-yellow-800': element.status === 'upcoming',
                'bg-gray-100 text-gray-800': element.status === 'past'
              }">
                            {{element.status}}
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="text-right">Actions</th>
                    <td mat-cell *matCellDef="let element" class="text-right">
                        <!-- Promote button is heavily emphasized and only visible for upcoming terms -->
                        <button *ngIf="element.status === 'upcoming'" mat-flat-button color="warn"
                            (click)="openPromoteDialog(element.id)">
                            <mat-icon svgIcon="heroicons_outline:arrow-up-circle"></mat-icon>
                            <span class="ml-2">Promote Students</span>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="border-b"
                    [ngClass]="{'bg-indigo-50/30': row.status === 'current'}"></tr>
            </table>

            <div *ngIf="isLoading" class="p-8 text-center text-hint">
                <mat-spinner diameter="32" class="mx-auto mb-4"></mat-spinner>
                Loading academic years...
            </div>
            <div *ngIf="!isLoading && dataSource.data.length === 0" class="p-16 text-center">
                <mat-icon svgIcon="heroicons_outline:calendar" class="icon-size-12 text-hint mb-4"></mat-icon>
                <div class="text-lg font-medium text-secondary">No academic years defined.</div>
            </div>
        </div>
    </div>

</div>
