<div class="main-surface">

    <!-- ChatGPT Style Header -->
    <div class="flex flex-none items-center px-6 md:px-10 h-14 bg-white/50 dark:bg-gray-900/50 backdrop-blur-sm z-20">
        <div class="flex items-center space-x-2">
            <span class="font-bold text-sm tracking-tight text-gray-700 dark:text-gray-300">SchoolOS Intelligence</span>
            <mat-icon class="icon-size-4 text-gray-400" [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
            <span class="text-gray-400 text-sm font-medium">Reporting</span>
        </div>
    </div>

    <!-- Message Scroller -->
    <div class="message-scroller px-4" #chatScroll>

        <div class="flex flex-col w-full max-w-3xl mx-auto pt-10 pb-30 space-y-10">

            <ng-container *ngFor="let message of messages">
                <!-- LLM Style Message Block (Left for AI, right for User or just standard alternating) -->
                <div class="w-full flex message-anim"
                    [ngClass]="{'justify-start': message.role === 'assistant', 'justify-end': message.role === 'user'}">

                    <div class="flex items-start max-w-[90%] sm:max-w-[85%]"
                        [ngClass]="{'flex-row': message.role === 'assistant', 'flex-row-reverse': message.role === 'user'}">

                        <!-- Avatar -->
                        <div class="flex-none w-8 h-8 rounded-full flex items-center justify-center mt-1 border border-gray-200 dark:border-gray-700"
                            [ngClass]="message.role === 'assistant' ? 'bg-primary text-white mr-4' : 'bg-gray-100 dark:bg-gray-800 ml-4'">
                            @if (message.role === 'assistant') {
                            <mat-icon class="icon-size-4 text-white" [svgIcon]="'heroicons_solid:cpu-chip'"></mat-icon>
                            } @else {
                            <mat-icon class="icon-size-4 text-primary" [svgIcon]="'heroicons_solid:user'"></mat-icon>
                            }
                        </div>

                        <!-- Content Bubble -->
                        <div class="flex flex-col" [ngClass]="message.role === 'user' ? 'items-end' : 'items-start'">
                            <div class="text-[15px] leading-relaxed text-gray-800 dark:text-gray-200"
                                [ngClass]="{'whitespace-pre-wrap': message.role === 'assistant'}">
                                {{message.content}}
                            </div>

                            <!-- SQL Extra -->
                            <div *ngIf="message.sql && false" class="mt-4 w-full">
                                <details
                                    class="group/sql border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden bg-gray-50/50 dark:bg-gray-900/50">
                                    <summary
                                        class="flex items-center px-4 py-2 text-[10px] font-bold text-gray-500 hover:text-primary cursor-pointer transition-colors list-none uppercase tracking-widest bg-gray-100 dark:bg-gray-800">
                                        <mat-icon class="icon-size-3 mr-2"
                                            [svgIcon]="'heroicons_outline:code-bracket'"></mat-icon>
                                        SQL Query
                                    </summary>
                                    <div
                                        class="p-4 bg-gray-900 font-mono text-[11px] text-emerald-400 select-all overflow-x-auto">
                                        {{message.sql}}
                                    </div>
                                </details>
                            </div>

                            <span class="mt-2 text-[10px] font-medium text-gray-400 opacity-50">{{message.timestamp |
                                date:'shortTime'}}</span>
                        </div>
                    </div>
                </div>
            </ng-container>

            <!-- Loading Spinner -->
            <div *ngIf="loading" class="flex items-start message-anim">
                <div
                    class="flex-none w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center mt-1 mr-4">
                    <mat-icon class="icon-size-4 animate-spin text-white"
                        [svgIcon]="'heroicons_outline:arrow-path'"></mat-icon>
                </div>
                <div class="flex space-x-1.5 mt-4">
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s">
                    </div>
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Fixed Floating Input Container -->
    <div class="input-container">
        <div class="input-wrapper">

            <!-- Quick Suggestions -->
            <div class="border-b border-gray-100 dark:border-gray-800 p-3">
                <button *ngFor="let suggestion of suggestions" (click)="sendQuestion(suggestion)"
                    class="m-1 whitespace-nowrap px-3 py-1.5 bg-gray-50 dark:bg-gray-700/50 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg text-[11px] font-medium text-gray-600 dark:text-gray-300 transition-all border border-gray-200/50 dark:border-gray-600/50 active:scale-95">
                    {{suggestion}}
                </button>
            </div>

            <!-- Main Input Bar -->
            <form [formGroup]="chatForm" (ngSubmit)="sendQuestion()" class="flex items-end p-2 px-4">
                <textarea matInput formControlName="question" placeholder="Message SchoolOS Intelligence..."
                    class="flex-auto h-12 bg-transparent border-none focus:ring-0 resize-none py-3 text-[15px] dark:text-gray-100 max-h-40"
                    (keydown.enter)="$event.preventDefault(); sendQuestion()" rows="1" #questionInput></textarea>

                <button type="submit" [disabled]="!chatForm.valid || loading"
                    class="flex-none ml-2 w-8 h-8 bg-primary text-white rounded-lg flex items-center justify-center transition-all disabled:opacity-20 active:scale-90 mb-1.5">
                    <mat-icon class="icon-size-4 text-white" [svgIcon]="'heroicons_outline:arrow-up'"></mat-icon>
                </button>
            </form>
        </div>

        <p class="mt-3 text-center text-[10px] font-normal">
            AI can make mistakes. Check important info.
        </p>
    </div>

</div>
